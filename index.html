<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Blood Strike Gold</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; --card-bg: #1a1a1a; --blood-red: #cc0000; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: white; overflow: hidden; }

        /* --- PINNED MESSAGE --- */
        #pinned-msg { background: #2d2a1e; border-bottom: 1px solid var(--gold); padding: 8px; font-size: 0.85em; display: none; text-align: center; color: var(--gold); z-index: 10; position: relative; }

        /* --- ONLINE INDICATOR --- */
        #online-count { font-size: 0.7em; color: #00ff00; margin-left: 5px; }

        /* --- CHAT ELEMENTS --- */
        #chat-container { display: none; height: 100vh; flex-direction: column; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #typing-indicator { font-size: 0.75em; color: #888; padding: 5px 15px; height: 20px; }
        
        .msg { background: #262626; padding: 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; position: relative; }
        .msg.admin-msg { border-left: 4px solid var(--gold); background: #2d2a1e; box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        
        /* --- RANGOS --- */
        .badge { font-size: 0.7em; padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .bronze { background: #cd7f32; color: white; }
        .silver { background: #c0c0c0; color: black; }
        .gold-rank { background: var(--gold); color: black; }

        /* --- ANIMACIÓN ADMIN --- */
        @keyframes particles { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
        .particle { position: fixed; bottom: 0; width: 5px; height: 5px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .window { background: #222; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); width: 85%; max-width: 350px; text-align: center; }
        
        /* INPUT SIN PUNTOS (TIPO TEXTO) */
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .color-picker { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .active-dot { border-color: white; }
    </style>
</head>
<body ontouchstart="checkGesto(event)">

    <div id="fake-store" style="padding:20px; text-align:center;">
        <h1 style="color:var(--blood-red)">BLOOD STRIKE STORE</h1>
        <p>Toca con 2 dedos para el sistema secreto</p>
    </div>

    <!-- PINNED -->
    <div id="pinned-msg">📌 <span id="pin-text">Cargando anuncio...</span></div>

    <!-- MODAL 1: CONTRASEÑA (VERIBLE) -->
    <div id="modal-pass" class="overlay">
        <div class="window">
            <h3>SISTEMA NEXUS</h3>
            <input type="text" id="input-pass" placeholder="Escribe la clave aquí">
            <button onclick="validarClave()" style="background:var(--gold); padding:10px 20px; border:none; border-radius:5px;">ENTRAR</button>
        </div>
    </div>

    <!-- MODAL 2: PERFIL -->
    <div id="modal-user" class="overlay">
        <div class="window">
            <h3>TU PERFIL</h3>
            <input type="text" id="input-name" placeholder="Tu alias">
            <p style="font-size:0.8em">Color de nombre:</p>
            <div class="color-picker">
                <div class="dot" style="background:#ff5555" onclick="selectColor('#ff5555', this)"></div>
                <div class="dot" style="background:#55ff55" onclick="selectColor('#55ff55', this)"></div>
                <div class="dot" style="background:#5555ff" onclick="selectColor('#5555ff', this)"></div>
                <div class="dot" style="background:#ffff55" onclick="selectColor('#ffff55', this)"></div>
            </div>
            <button onclick="entrarAlChat()" style="background:var(--gold); padding:10px 20px; border:none; border-radius:5px;">CONECTAR</button>
        </div>
    </div>

    <!-- CHAT APP -->
    <div id="chat-container">
        <header style="background:#1a1a1a; padding:15px; display:flex; justify-content:space-between;">
            <div>NEXUS CHAT <span id="online-count">● 0 Online</span></div>
            <div id="user-header" style="font-size:0.8em"></div>
        </header>
        <div id="chat-box"></div>
        <div id="typing-indicator"></div>
        <div style="padding:15px; background:#1a1a1a; display:flex; gap:10px;">
            <input type="text" id="msg-input" placeholder="Escribe..." oninput="isTyping()">
            <button onclick="enviarTexto()" style="background:var(--gold); border:none; padding:10px; border-radius:5px;">ENVIAR</button>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE[span_2](start_span)[span_2](end_span)
        const firebaseConfig = {
            apiKey: "AIzaSyAzzRWHGhYVFgkWyRwfgNKc5Ql52U4xxM8",
            authDomain: "hyper-drip.firebaseapp.com",
            projectId: "hyper-drip",
            storageBucket: "hyper-drip.firebasestorage.app",
            messagingSenderId: "1023275797824",
            appId: "1:1023275797824:web:378ce9a674db72af05fea5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let nickname = localStorage.getItem('nexus_user') || "";
        let userColor = localStorage.getItem('nexus_color') || "#ffffff";
        let esAdmin = false;
        let typingTimeout;

        function checkGesto(e) { if (e.touches.length === 2) document.getElementById('modal-pass').style.display = 'flex'; }

        function selectColor(color, el) {
            userColor = color;
            localStorage.setItem('nexus_color', color);
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active-dot'));
            el.classList.add('active-dot');
        }

        function validarClave() {
            const c = document.getElementById('input-pass').value;
            if (c === "XDD1018") { esAdmin = false; nextStep(); }
            else if (c === "CHRISS PLUS") { esAdmin = true; nextStep(); }
            else { alert("Clave incorrecta"); }
        }

        function nextStep() {
            document.getElementById('modal-pass').style.display = 'none';
            document.getElementById('modal-user').style.display = 'flex';
        }

        function entrarAlChat() {
            nickname = document.getElementById('input-name').value;
            if (!nickname) return;
            localStorage.setItem('nexus_user', nickname);
            document.getElementById('modal-user').style.display = 'none';
            document.getElementById('fake-store').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            
            // Online Count & Welcome[span_3](start_span)[span_3](end_span)
            updateOnline(1);
            db.collection("chat_bs").add({ u: "SISTEMA", t: `¡Bienvenido ${nickname} a NEXUS!`, system: true, time: firebase.firestore.FieldValue.serverTimestamp() });
            
            iniciarEscucha();
        }

        function isTyping() {
            db.collection("status").doc(nickname).set({ typing: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { db.collection("status").doc(nickname).set({ typing: false }); }, 2000);
        }

        function enviarTexto() {
            const t = document.getElementById('msg-input').value;
            if (!t) return;
            db.collection("chat_bs").add({ u: nickname, t: t, a: esAdmin, c: userColor, time: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('msg-input').value = "";
            if(esAdmin) spawnParticles(); // Animación admin[span_4](start_span)[span_4](end_span)
        }

        function spawnParticles() {
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + "vw";
                p.style.animation = `particles ${Math.random() * 2 + 1}s linear forwards`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        }

        function getBadge(count) {
            if (count > 50) return '<span class="badge gold-rank">ORO</span>';
            if (count > 20) return '<span class="badge silver">PLATA</span>';
            if (count > 5) return '<span class="badge bronze">BRONCE</span>';
            return '';
        }

        function iniciarEscucha() {
            // Escuchar Mensajes
            db.collection("chat_bs").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${d.a ? 'admin-msg' : ''}`;
                    div.style.alignSelf = d.u === nickname ? 'flex-end' : 'flex-start';
                    
                    // Lógica de Reacción Toque Largo[span_5](start_span)[span_5](end_span)
                    div.oncontextmenu = (e) => { e.preventDefault(); alert("Reacción: 🔥"); };

                    div.innerHTML = `<strong style="color:${d.c || '#fff'}">${d.u}</strong> ${getBadge(10)}<br>${d.t}`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });

            // Online Indicator[span_6](start_span)[span_6](end_span)
            db.collection("status").onSnapshot(snap => {
                let count = 0;
                let typing = [];
                snap.forEach(doc => {
                    count++;
                    if(doc.data().typing && doc.id !== nickname) typing.push(doc.id);
                });
                document.getElementById('online-count').innerText = `● ${count} Online`;
                document.getElementById('typing-indicator').innerText = typing.length > 0 ? `${typing.join(", ")} está escribiendo...` : "";
            });
        }

        function updateOnline(val) { /* Lógica para incrementar contador en DB */ }
    </script>
</body>
</html>
