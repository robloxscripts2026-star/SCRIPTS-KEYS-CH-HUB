<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blood Strike - Top-Up Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --gold: #ffcc00; --dark: #050505; --card-bg: #111; --blood: #ff0000; }
        body { margin: 0; font-family: 'Oswald', sans-serif; background: var(--dark); color: white; overflow: hidden; }

        /* --- TIENDA INVISIBLE --- */
        #store { height: 100vh; overflow-y: auto; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #222; }

        /* --- MODALES --- */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .win { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 85%; max-width: 350px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 8px; text-align: center; }

        /* --- CHAT --- */
        #nexus { display: none; height: 100vh; flex-direction: column; background: #080808; }
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .m { padding: 12px; border-radius: 15px; max-width: 80%; position: relative; background: #222; align-self: flex-start; }
        .m-admin { border-left: 4px solid var(--gold); background: #2d2a1e; }
        .m img { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }
        
        /* BOTÓN DESCARGA (SOLO ADMIN) */
        .dl-btn { display: inline-block; margin-top: 8px; color: var(--gold); font-size: 0.7em; text-decoration: none; border: 1px solid var(--gold); padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        
        /* REACCIONES */
        .reac-bar { display: none; position: absolute; top: -30px; right: 0; background: #333; border-radius: 20px; padding: 5px 10px; gap: 10px; z-index: 5; }
        .m:active .reac-bar { display: flex; } /* Toque largo visual */

        .u-name { font-size: 0.75em; font-weight: bold; margin-bottom: 4px; display: block; }
        .part { position: fixed; bottom: 0; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body ontouchstart="gesto(event)">

    <!-- FACHADA -->
    <div id="store">
        <h2>TOP-UP CENTER</h2>
        <div class="grid">
            <div class="card">💰 100 Gold<br><button style="background:var(--blood); border:none; color:white; width:100%; margin-top:5px;">$0.99</button></div>
            <div class="card">💰 500 Gold<br><button style="background:var(--blood); border:none; color:white; width:100%; margin-top:5px;">$4.99</button></div>
        </div>
    </div>

    <!-- ACCESO -->
    <div id="modal-lock" class="overlay">
        <div class="win">
            <h2 style="color:var(--gold)">NEXUS CORE</h2>
            <input type="text" id="pass-key" placeholder="IDENTIFICADOR">
            <button onclick="validar()" style="background:var(--gold); border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">VERIFICAR</button>
        </div>
    </div>

    <!-- PERFIL -->
    <div id="modal-profile" class="overlay">
        <div class="win">
            <h3>PERFIL DE USUARIO</h3>
            <input type="text" id="user-alias" placeholder="TU NICKNAME">
            <button onclick="conectar()" style="background:var(--gold); border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">INICIAR</button>
        </div>
    </div>

    <!-- APP FINAL -->
    <div id="nexus">
        <header style="padding:15px; background:#111; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
            <div style="color:var(--gold); font-weight:bold;">NEXUS HUB <span id="online" style="color:#0f0; font-size:0.7em;">● 0</span></div>
            <div id="typing" style="font-size:0.7em; color:#666;"></div>
        </header>
        <div id="chat-area"></div>
        <div style="padding:15px; background:#111; display:flex; gap:10px; align-items:center;">
            <button onclick="document.getElementById('img-up').click()" style="background:none; border:none; font-size:1.5em; cursor:pointer;">🖼️</button>
            <input type="file" id="img-up" accept="image/*" style="display:none" onchange="subirImg(event)">
            <input type="text" id="msg" placeholder="Mensaje..." oninput="isTyping()" style="margin:0;">
            <button onclick="send()" style="background:var(--blood); border:none; padding:10px; border-radius:5px; color:white; font-weight:bold;">SEND</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzzRWHGhYVFgkWyRwfgNKc5Ql52U4xxM8",
            authDomain: "hyper-drip.firebaseapp.com",
            projectId: "hyper-drip",
            storageBucket: "hyper-drip.firebasestorage.app",
            messagingSenderId: "1023275797824",
            appId: "1:1023275797824:web:378ce9a674db72af05fea5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let nick = localStorage.getItem('n_u') || "";
        let isAdmin = false;
        let tOut;

        function gesto(e) { if(e.touches.length === 2) document.getElementById('modal-lock').style.display = 'flex'; }

        function validar() {
            const k = document.getElementById('pass-key').value;
            if(k === "XDD1018") { isAdmin = false; next(); }
            else if(k === "CHRISS PLUS") { isAdmin = true; next(); }
            else { document.getElementById('modal-lock').style.display = 'none'; }
        }

        function next() {
            document.getElementById('modal-lock').style.display = 'none';
            document.getElementById('modal-profile').style.display = 'flex';
            if(nick) document.getElementById('user-alias').value = nick;
        }

        function conectar() {
            nick = document.getElementById('user-alias').value;
            if(!nick) return;
            localStorage.setItem('n_u', nick);
            document.getElementById('modal-profile').style.display = 'none';
            document.getElementById('store').style.display = 'none';
            document.getElementById('nexus').style.display = 'flex';
            init();
        }

        function isTyping() {
            db.collection("status").doc(nick).set({ t: true });
            clearTimeout(tOut);
            tOut = setTimeout(() => db.collection("status").doc(nick).set({ t: false }), 2000);
        }

        function send() {
            const m = document.getElementById('msg').value;
            if(!m) return;
            db.collection("chat_bs").add({ u: nick, t: m, a: isAdmin, time: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('msg').value = "";
            if(isAdmin) anim();
        }

        function subirImg(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                db.collection("chat_bs").add({ u: nick, img: ev.target.result, a: isAdmin, time: firebase.firestore.FieldValue.serverTimestamp() });
            };
            reader.readAsDataURL(file);
        }

        function anim() {
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'part';
                p.style.left = Math.random() * 100 + "vw";
                p.style.animation = `slideIn ${Math.random()*2+1}s linear reverse`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        function init() {
            db.collection("chat_bs").orderBy("time", "asc").onSnapshot(snap => {
                const area = document.getElementById('chat-area');
                area.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `m ${d.a ? 'm-admin' : ''}`;
                    
                    // REACCIONES (TOQUE LARGO/HOVER)[span_1](start_span)[span_1](end_span)
                    let html = `<div class="reac-bar">🔥 ❤️ 👍</div>`;
                    html += `<span class="u-name">${d.u}${d.a ? ' 👑' : ''}</span>`;
                    if(d.t) html += `<span>${d.t}</span>`;
                    
                    if(d.img) {
                        html += `<img src="${d.img}">`;
                        // BOTÓN SOLO PARA TI (ADMIN)[span_2](start_span)[span_2](end_span)
                        if(isAdmin) {
                            html += `<a href="${d.img}" download="NEXUS_${Date.now()}.png" class="dl-btn">⬇️ DESCARGAR (ADMIN)</a>`;
                        }
                    }
                    
                    div.innerHTML = html;
                    area.appendChild(div);
                });
                area.scrollTop = area.scrollHeight;
            });

            db.collection("status").onSnapshot(snap => {
                let on = 0; let ty = [];
                snap.forEach(doc => { on++; if(doc.data().t && doc.id !== nick) ty.push(doc.id); });
                document.getElementById('online').innerText = `● ${on}`;
                document.getElementById('typing').innerText = ty.length > 0 ? "Alguien está escribiendo..." : "";
            });
        }
    </script>
</body>
</html>
