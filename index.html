<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Strike - Gold Store</title>
    
    <!-- Scripts de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --gold: #ffcc00;
            --dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --blood-red: #cc0000;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark);
            color: white;
            overflow-x: hidden;
        }

        /* --- TIENDA FINGIDA --- */
        #fake-store { padding: 20px; text-align: center; }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        .item-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .gold-amount { color: var(--gold); font-weight: bold; font-size: 1.2em; }
        .buy-btn {
            background: var(--blood-red);
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }

        /* --- MODALES --- */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .window {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* --- CHAT REAL --- */
        #main-app {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: #0f0f0f;
        }
        header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; text-align: center; color: var(--gold); font-weight: bold; }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            background: #262626;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 85%;
            align-self: flex-start;
        }
        .msg.admin-msg { border-left: 4px solid var(--gold); background: #2d2a1e; }
        .msg strong { color: var(--gold); font-size: 0.9em; display: block; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #444; }
        
        /* Estilo del botón de descarga solo para Admin */
        .download-btn { 
            display: inline-block; 
            margin-top: 8px; 
            color: var(--gold); 
            font-size: 0.75em; 
            text-decoration: none; 
            border: 1px solid var(--gold);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .input-area { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body ontouchstart="checkGesto(event)">

    <!-- FACHADA -->
    <div id="fake-store">
        <h1 style="color:var(--blood-red)">BLOOD STRIKE STORE</h1>
        <div class="store-grid">
            <script>
                const packs = [100, 320, 600, 1200, 3800, 4000, 5000, 6320];
                packs.forEach(p => {
                    document.write(`
                        <div class="item-card">
                            <div style="font-size:2em">💰</div>
                            <div class="gold-amount">${p} Oro</div>
                            <button class="buy-btn">COMPRAR</button>
                        </div>
                    `);
                });
            </script>
        </div>
    </div>

    <!-- MODAL 1: CONTRASEÑA -->
    <div id="modal-pass" class="overlay">
        <div class="window">
            <h3>SISTEMA NEXUS</h3>
            <input type="password" id="input-pass" placeholder="Contraseña de acceso">
            <button onclick="validarClave()" class="buy-btn" style="background:var(--gold); color:black">ENTRAR</button>
        </div>
    </div>

    <!-- MODAL 2: IDENTIDAD -->
    <div id="modal-user" class="overlay">
        <div class="window">
            <h3 id="user-status">NOMBRE:</h3>
            <input type="text" id="input-name" placeholder="Tu alias...">
            <button onclick="entrarAlChat()" class="buy-btn" style="background:var(--gold); color:black">CONECTAR</button>
        </div>
    </div>

    <!-- CHAT EN TIEMPO REAL -->
    <div id="main-app">
        <header id="chat-header">CONECTANDO...</header>
        <div id="chat-box"></div>
        <div class="input-area">
            <button onclick="document.getElementById('img-file').click()" style="background:none; border:none; font-size:1.5em; cursor:pointer">🖼️</button>
            <input type="file" id="img-file" accept="image/*" style="display:none" onchange="subirImagen(event)">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
            <button onclick="enviarTexto()" class="buy-btn" style="margin:0; width:auto">ENVIAR</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (TUS DATOS)[span_1](start_span)[span_1](end_span)
        const firebaseConfig = {
            apiKey: "AIzaSyAzzRWHGhYVFgkWyRwfgNKc5Ql52U4xxM8",
            authDomain: "hyper-drip.firebaseapp.com",
            projectId: "hyper-drip",
            storageBucket: "hyper-drip.firebasestorage.app",
            messagingSenderId: "1023275797824",
            appId: "1:1023275797824:web:378ce9a674db72af05fea5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let nickname = localStorage.getItem('nexus_user') || "";
        let esAdmin = false;

        // Gesto: 2 Dedos simultáneos[span_2](start_span)[span_2](end_span)
        function checkGesto(e) {
            if (e.touches.length === 2) {
                document.getElementById('modal-pass').style.display = 'flex';
            }
        }

        function validarClave() {
            const clave = document.getElementById('input-pass').value;
            if (clave === "XDD1018") {
                esAdmin = false;
                pedirNombre();
            } else if (clave === "CHRISS PLUS") {
                esAdmin = true;
                pedirNombre();
            } else {
                alert("Clave incorrecta");
            }
        }

        function pedirNombre() {
            document.getElementById('modal-pass').style.display = 'none';
            document.getElementById('modal-user').style.display = 'flex';
            if (nickname) {
                document.getElementById('user-status').innerText = "BIENVENIDO, " + nickname.toUpperCase();
                document.getElementById('input-name').value = nickname;
            }
        }

        function entrarAlChat() {
            const n = document.getElementById('input-name').value;
            if (n) {
                nickname = n;
                localStorage.setItem('nexus_user', n);
                document.getElementById('modal-user').style.display = 'none';
                document.getElementById('fake-store').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('chat-header').innerText = `MODO: ${esAdmin ? 'ADMINISTRADOR 👑' : 'USUARIO'}`;
                iniciarEscucha();
            }
        }

        function enviarTexto() {
            const inp = document.getElementById('msg-input');
            if (!inp.value) return;
            db.collection("chat_bs").add({
                u: nickname,
                t: inp.value,
                a: esAdmin,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            inp.value = "";
        }

        function subirImagen(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    db.collection("chat_bs").add({
                        u: nickname,
                        img: ev.target.result,
                        a: esAdmin,
                        time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function iniciarEscucha() {
            db.collection("chat_bs").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${d.a ? 'admin-msg' : ''}`;
                    
                    let content = `<strong>${d.u}${d.a ? ' 👑' : ''}</strong>`;
                    if (d.t) content += `<span>${d.t}</span>`;
                    
                    if (d.img) {
                        content += `<img src="${d.img}">`;
                        // LÓGICA CLAVE: Solo el Admin actual puede ver el botón de descarga[span_3](start_span)[span_3](end_span)
                        if (esAdmin) {
                            content += `<a href="${d.img}" download="NEXUS_${Date.now()}.png" class="download-btn">⬇️ DESCARGAR (ADMIN)</a>`;
                        }
                    }
                    
                    msgDiv.innerHTML = content;
                    box.appendChild(msgDiv);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
