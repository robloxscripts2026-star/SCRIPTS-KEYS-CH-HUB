<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXUS STORE 💎</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --purple: #bc13fe;
      --orange: #ff6600;
      --blue:   #00d2ff;
      --green:  #00ff88;
      --gold:   #ffcc00;
      --cyan:   #00ccff;
      --bg:     #05000a;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body { background:var(--bg); color:#fff; font-family:'Rajdhani',sans-serif; overflow-x:hidden; }

    /* --- INTRO OPTIMIZADA (SIN LAG) --- */
    #intro {
      position:fixed; inset:0; z-index:99999;
      background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      overflow:hidden;
    }

    .intro-inner {
      position:relative; z-index:3;
      text-align:center;
      will-change: transform, opacity;
      transform: translateZ(0);
      animation: introZoom 8.5s cubic-bezier(.25,.46,.45,.94) forwards;
    }

    @keyframes introZoom {
      0%   { transform:scale(.4) translateY(60px); opacity:0; filter:blur(15px); }
      14%  { transform:scale(1) translateY(0);  opacity:1; filter:blur(0); }
      82%  { transform:scale(1.05); opacity:1; filter:blur(0); }
      100% { transform:scale(10);  opacity:0; filter:blur(30px); }
    }

    .glitch {
      font-family:'Orbitron',sans-serif;
      font-size: clamp(3.5rem, 12vw, 8rem);
      font-weight:900; color: var(--orange);
      letter-spacing: 16px; text-transform:uppercase;
      text-shadow: 0 0 15px var(--orange);
      position:relative; display:block;
    }

    .intro-bar-fill {
      height:100%; width: 100%;
      background: linear-gradient(90deg,var(--purple),var(--orange),var(--blue));
      box-shadow: 0 0 12px var(--purple);
      animation: fillBar 4s ease 3.8s forwards;
      clip-path: inset(0 100% 0 0); /* Optimización de lag */
    }
    @keyframes fillBar { to { clip-path: inset(0 0 0 0); } }

    /* --- MAIN & CARDS --- */
    .grid-bg {
      position:fixed; inset:0; z-index:-1;
      background-image: linear-gradient(rgba(188,19,254,.05) 1px, transparent 1px),
                        linear-gradient(90deg,rgba(188,19,254,.05) 1px, transparent 1px);
      background-size:44px 44px;
      animation: gridScroll 9s linear infinite;
    }
    @keyframes gridScroll { to{transform: translateY(44px);} }

    #main { opacity:0; animation: showMain 1s ease 7.5s forwards; padding-bottom:120px; }
    @keyframes showMain { to{opacity:1} }

    .container { max-width:1150px; margin:0 auto; padding:24px; text-align:center; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:26px; margin-top:40px; }

    .card {
      background:rgba(8,0,16,.88); border:2px solid; border-radius:22px;
      padding:36px 24px; transition:.4s; backdrop-filter:blur(12px);
    }
    .card:hover { transform:translateY(-10px); }

    .buy-btn {
      width:100%; padding:15px; border-radius:50px; border:none;
      font-family:'Orbitron',sans-serif; color:#fff; cursor:pointer; font-weight:700;
    }

    .t-purple { border-color:var(--purple); }
    .t-purple .buy-btn { background: var(--purple); box-shadow:0 0 20px var(--purple); }
    .t-cyan { border-color:var(--cyan); }
    .t-cyan .buy-btn { background: var(--cyan); box-shadow:0 0 20px var(--cyan); }

    /* TOAST & MODAL */
    #toast {
      position:fixed; top:-90px; left:50%; transform:translateX(-50%);
      background:var(--purple); color:#fff; padding:14px 30px; border-radius:50px;
      transition:.5s; z-index:999999;
    }
    #toast.on { top:28px; }

    #modal {
      display:none; position:fixed; inset:0; z-index:99998;
      background:rgba(0,0,0,.85); align-items:center; justify-content:center;
    }
    #modal.on { display:flex; }
    .modal-box { background:#0d0018; border:2px solid var(--purple); padding:40px; border-radius:24px; text-align:center; max-width:400px; }
  </style>
</head>
<body>

<div id="intro">
  <div class="intro-inner">
    <span class="glitch">NEXUS</span>
    <div class="intro-bar-fill"></div>
  </div>
</div>

<div class="grid-bg"></div>
<div id="toast">✅ COPIADO</div>

<div id="modal">
  <div class="modal-box">
    <h3 style="color:var(--purple)">⚡ CONFIRMAR</h3>
    <p id="modalPlan" style="margin:20px 0; font-size:1.2rem"></p>
    <button onclick="doCompra()" style="padding:10px 20px; background:var(--purple); border:none; color:#fff; border-radius:50px; cursor:pointer">IR A TIKTOK 🚀</button>
    <button onclick="closeModal()" style="background:transparent; color:#555; border:none; margin-top:10px; cursor:pointer">CANCELAR</button>
  </div>
</div>

<div id="main">
  <div class="container">
    <h1 style="font-size:3rem; text-shadow:0 0 20px var(--purple)">NEXUS STORE 👑</h1>
    
    <div class="grid">
      <div class="card t-purple">
        <h2>1 MES</h2>
        <div style="font-size:2rem; margin:15px 0">$18 USD</div>
        <button class="buy-btn" onclick="openModal('Drip Cliente 🟣','Quiero adquirir drip cliente🟣 :1 MES')">COMPRAR 💳</button>
      </div>
    </div>

    <div style="margin-top:80px; border-top:1px solid var(--cyan); padding-top:40px">
      <h2 style="color:var(--cyan); font-size:2.5rem; text-shadow:0 0 20px var(--cyan)">CUBA MODS 🔵</h2>
      <div class="grid">
        <div class="card t-cyan">
          <h2>3 DÍAS</h2>
          <div>$70 MXN</div>
          <button class="buy-btn" onclick="openModal('Cuba Mods 🔵','Hola, quiero adquirir cuba mods🔵 de 3 dias')">COMPRAR 💳</button>
        </div>
        <div class="card t-cyan">
          <h2>7 DÍAS</h2>
          <div>$160 MXN</div>
          <button class="buy-btn" onclick="openModal('Cuba Mods 🔵','Hola, quiero adquirir cuba mods🔵 de 7 días')">COMPRAR 💳</button>
        </div>
        <div class="card t-cyan">
          <h2>30 DÍAS</h2>
          <div>$350 MXN</div>
          <button class="buy-btn" onclick="openModal('Cuba Mods 🔵','Hola, quiero adquirir cuba mods🔵 de Mes')">COMPRAR 💳</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentMsg = "";
  const TIKTOK_URL = "https://www.tiktok.com/@nexus1841"; //

  function openModal(plan, msg) {
    document.getElementById('modalPlan').innerText = plan;
    currentMsg = msg;
    document.getElementById('modal').classList.add('on');
  }

  function closeModal() { document.getElementById('modal').classList.remove('on'); }

  function doCompra() {
    const el = document.createElement('textarea');
    el.value = currentMsg; //
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    
    document.getElementById('toast').classList.add('on');
    setTimeout(() => {
      window.open(TIKTOK_URL, "_blank");
      document.getElementById('toast').classList.remove('on');
      closeModal();
    }, 1200);
  }
</script>
</body>
</html>
